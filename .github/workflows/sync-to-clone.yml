name: Sync to Clone Repo

on:
  push:
    branches:
      - develop  # 원본의 develop 브랜치에 푸시/머지될 때 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 원본 레포 코드 가져오기
      - name: Checkout Original Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CLONE_TOKEN }}

      # 2. 너의 정보로 Git 설정하기
      - name: Set Git Config
        run: |
          git config --global user.name "ueeeeing"
          git config --global user.email "ueeeeing@a@a.com"

      # 3. 클론 레포로 푸시 (워크플로우 제외)
      - name: Push to Clone Repo
        run: |
          # 1. 클론 레포에 포함하고 싶지 않은 워크플로우 폴더 삭제
          rm -rf .github/workflows

          # 2. 삭제한 내용을 커밋 (가상 환경에서의 로컬 작업이라 원본 레포엔 영향 없음)
          git add -A
          git commit -m "chore: remove workflows for clone repo" || echo "No changes to commit"

          # 3. 클론 레포 주소 설정
          REMOTE_REPO="https://${{ secrets.CLONE_TOKEN }}@github.com/ueeeeing/moodot-clone.git"
          git remote add clone-target $REMOTE_REPO

          # 4. 푸시! (원본의 develop 내용을 클론의 main으로 덮어쓰기)
          git push clone-target develop:main --force
