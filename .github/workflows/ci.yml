name: Project CI Check

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**"]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:memory-archives

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          MEMORY_TEXT_ENCRYPTION_KEY: ${{ secrets.MEMORY_TEXT_ENCRYPTION_KEY }}

  ai-worker-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AI Worker image
        run: |
          docker build \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t ai-worker:local \
            -f service/Dockerfile service

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker tag ai-worker:local $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Save current Task Definition ARN (rollback 대비)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: current-task
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          ARN=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: sha-${{ github.sha }}
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
        run: |
          # 현재 Task Definition에서 이미지만 새 태그로 교체해 새 revision 등록
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $NEW_REVISION

      - name: Wait for deployment to stabilize
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE
        timeout-minutes: 10

      - name: Rollback on failure
        if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          PREV_TASK_ARN: ${{ steps.current-task.outputs.arn }}
        run: |
          echo "배포 실패 — $PREV_TASK_ARN 으로 롤백합니다"
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $PREV_TASK_ARN
